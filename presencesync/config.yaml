name: PresenceSync
version: "0.4.0"
slug: presencesync
description: Track Apple AirTags, iPhones, iPads, Macs, and Apple Watches in Home Assistant via Find My.
image: ghcr.io/bexelbie/presencesync-{arch}
arch:
  - amd64
  - aarch64
url: https://github.com/bexelbie/presencesync-addon
init: false
hassio_api: true
homeassistant_api: true
auth_api: true
services:
  - mqtt:want
host_network: false
ingress: true
ingress_port: 8099
ingress_entry: /
panel_icon: mdi:map-marker-multiple
panel_title: PresenceSync
panel_admin: true
ports:
  8099/tcp: null
ports_description:
  8099/tcp: PresenceSync setup wizard (also reachable via HA sidebar)
boot: auto
startup: services
map:
  - share:rw
options:
  log_level: info
  mqtt_discovery_prefix: homeassistant
  state_prefix: presencesync
schema:
  log_level: list(debug|info|warning|error)
  mqtt_discovery_prefix: str
  state_prefix: str
