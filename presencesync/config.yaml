name: PresenceSync
version: "0.6.0"
slug: presencesync
description: Track Apple AirTags (owned + shared), iPhones, iPads, Macs, and Apple Watches in Home Assistant via Find My.
image: ghcr.io/bexelbie/presencesync-{arch}
arch:
  - amd64
  - aarch64
url: https://github.com/bexelbie/presencesync-addon
init: false
hassio_api: true
homeassistant_api: true
auth_api: true
services:
  - mqtt:want
host_network: false
ingress: true
ingress_port: 8099
ingress_entry: /
ports:
  8099/tcp: null
ports_description:
  8099/tcp: PresenceSync API (reachable via HA Ingress)
boot: auto
startup: services
map:
  - share:rw
options:
  log_level: info
  poll_interval: 300
  refresh_interval: 1800
  item_poll_interval: 600
  stationary_radius: 50
  unavailable_timeout: 86400
  devices: []
schema:
  log_level: list(debug|info|warning|error)
  poll_interval: int(0,86400)
  refresh_interval: int(0,86400)
  item_poll_interval: int(0,86400)
  stationary_radius: int(0,10000)
  unavailable_timeout: int(0,604800)
  devices:
    - id: str
      stationary_radius: int?
      exclude: bool?
      unavailable_timeout: int?
